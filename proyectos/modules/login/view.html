<style>
    .login-shell {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        padding: 20px;
        background: #282a36;
        gap: 14px;
    }

    /* Avatar */
    .avatar-wrap {
        position: relative;
        width: 150px;
        height: 150px;
    }

    .avatar-img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        transition: opacity 0.25s ease;
        filter: drop-shadow(0 8px 20px rgba(189, 147, 249, 0.2));
    }

    /* idle - visible by default */
    #av-idle {
        opacity: 1;
        animation: float 3s ease-in-out infinite;
    }

    #av-email {
        opacity: 0;
    }

    #av-pass {
        opacity: 0;
    }

    /* states */
    .avatar-wrap.state-email #av-idle {
        opacity: 0;
        animation: none;
    }

    .avatar-wrap.state-email #av-email {
        opacity: 1;
        animation: bounce 0.4s ease;
    }

    .avatar-wrap.state-pass #av-idle {
        opacity: 0;
        animation: none;
    }

    .avatar-wrap.state-pass #av-email {
        opacity: 0;
    }

    .avatar-wrap.state-pass #av-pass {
        opacity: 1;
        animation: peekIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes float {

        0%,
        100% {
            transform: translateY(0);
        }

        50% {
            transform: translateY(-8px);
        }
    }

    @keyframes bounce {
        0% {
            transform: scale(0.9);
        }

        60% {
            transform: scale(1.05);
        }

        100% {
            transform: scale(1);
        }
    }

    @keyframes peekIn {
        0% {
            transform: scale(0.85) rotate(-4deg);
        }

        60% {
            transform: scale(1.06) rotate(2deg);
        }

        100% {
            transform: scale(1) rotate(0deg);
        }
    }

    /* Caption bubble */
    .caption-bubble {
        background: #343746;
        border: 1px solid #44475a;
        border-radius: 20px;
        padding: 6px 16px;
        font-size: 0.72rem;
        color: #f8f8f2;
        font-family: 'Inter', sans-serif;
        transition: all 0.3s ease;
        white-space: nowrap;
        position: relative;
    }

    .caption-bubble::before {
        content: '';
        position: absolute;
        top: -8px;
        left: 50%;
        transform: translateX(-50%);
        border: 4px solid transparent;
        border-bottom-color: #44475a;
    }

    /* Login card */
    .login-card {
        background: #21222c;
        border: 1px solid #44475a;
        border-radius: 14px;
        padding: 22px;
        width: 100%;
        max-width: 290px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        font-family: 'Inter', sans-serif;
    }

    .login-card-title {
        font-size: 0.95rem;
        font-weight: 700;
        color: #f8f8f2;
        text-align: center;
    }

    .input-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    .input-label {
        font-size: 0.68rem;
        color: #6272a4;
        font-weight: 500;
    }

    .login-input {
        padding: 9px 12px;
        background: #282a36;
        border: 1.5px solid #44475a;
        border-radius: 8px;
        color: #f8f8f2;
        font-size: 0.82rem;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
        font-family: 'Inter', sans-serif;
    }

    .login-input:focus {
        border-color: #bd93f9;
        box-shadow: 0 0 0 3px rgba(189, 147, 249, 0.12);
    }

    .login-input::placeholder {
        color: #6272a4;
    }

    .login-btn {
        padding: 10px;
        background: linear-gradient(135deg, #bd93f9, #8be9fd);
        color: #21222c;
        font-weight: 800;
        font-size: 0.82rem;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: 'Inter', sans-serif;
        transition: opacity 0.2s, transform 0.15s;
        letter-spacing: 0.3px;
    }

    .login-btn:hover {
        opacity: 0.9;
        transform: translateY(-1px);
    }

    .login-btn:active {
        transform: scale(0.98);
    }

    .login-footer {
        text-align: center;
        font-size: 0.68rem;
        color: #6272a4;
    }

    .login-footer span {
        color: #bd93f9;
        cursor: pointer;
    }

    .login-footer span:hover {
        text-decoration: underline;
    }
</style>

<div class="login-shell">

    <!-- Avatar states -->
    <div class="avatar-wrap" id="avatar-wrap">
        <img id="av-idle" class="avatar-img" src="/src/img/avatar-feliz.png" alt="idle">
        <img id="av-email" class="avatar-img" src="/src/img/avatar-sonrie.png" alt="email">
        <img id="av-pass" class="avatar-img" src="/src/img/avatar-ojos-tapados.png" alt="password">
    </div>

    <!-- Speech bubble -->
    <div class="caption-bubble" id="login-caption">
        😊 &nbsp;¡Hola! Bienvenido de vuelta
    </div>

    <!-- Card -->
    <div class="login-card">
        <div class="login-card-title">Iniciar Sesión</div>

        <div class="input-group">
            <label class="input-label" for="login-email">Correo electrónico</label>
            <input id="login-email" class="login-input" type="email" placeholder="admin@portfolio.dev"
                autocomplete="off">
        </div>

        <div class="input-group">
            <label class="input-label" for="login-pass">Contraseña</label>
            <input id="login-pass" class="login-input" type="password" placeholder="••••••••">
        </div>

        <button class="login-btn">Entrar al sistema →</button>

        <div class="login-footer">
            ¿Olvidaste tu contraseña? <span>Recuperar acceso</span>
        </div>
    </div>
</div>

<script>
    (function () {
        const wrap = document.getElementById('avatar-wrap');
        const caption = document.getElementById('login-caption');
        const email = document.getElementById('login-email');
        const pass = document.getElementById('login-pass');

        const CAPTIONS = {
            idle: '😊 &nbsp;¡Hola! Bienvenido de vuelta',
            email: '👀 &nbsp;¡Veré que escribes correctamente!',
            pass: '🙈 &nbsp;¡No miro, lo juro!',
        };

        function setState(s) {
            wrap.className = 'avatar-wrap' + (s !== 'idle' ? ` state-${s}` : '');
            caption.innerHTML = CAPTIONS[s];
        }

        email.addEventListener('focus', () => setState('email'));
        email.addEventListener('blur', () => {
            if (document.activeElement !== pass) setState('idle');
        });

        pass.addEventListener('focus', () => setState('pass'));
        pass.addEventListener('blur', () => {
            if (document.activeElement !== email) setState('idle');
        });
    })();
</script>
